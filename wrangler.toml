name = "mirrorbot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# account_id is set via CLOUDFLARE_ACCOUNT_ID env var in CI, or wrangler.local.toml locally

[vars]
# TELEGRAM_BOT_TOKEN is set as a secret via wrangler secret put / GitHub Actions

[[kv_namespaces]]
binding = "RATE_KV"
id = "PLACEHOLDER_KV_ID"          # filled in by deploy workflow on first run


[triggers]
crons = ["*/10 * * * *"]  # verify proxy pool every 10 minutes
