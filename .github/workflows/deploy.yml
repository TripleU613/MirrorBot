name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install main worker dependencies
        run: npm ci

      - name: Install solver worker dependencies
        working-directory: solver
        run: npm ci

      # Deploy solver first (mirrorbot depends on it via service binding)
      - name: Deploy solver Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 2069a0e7348e495373ef64e17cc6ecc1
          workingDirectory: solver
          command: deploy

      # Provision KV namespace for main worker
      - name: Provision KV namespace
        env:
          CF_API_EMAIL: goyslopgateway@gmail.com
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_ACCOUNT_ID: 2069a0e7348e495373ef64e17cc6ecc1
        run: |
          EXISTING=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "X-Auth-Email: ${CF_API_EMAIL}" \
            -H "X-Auth-Key: ${CF_API_KEY}" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); ns=[n['id'] for n in (d.get('result') or []) if n['title']=='mirrorbot-rate-kv']; print(ns[0] if ns else '')")

          if [ -z "$EXISTING" ]; then
            KV_ID=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" \
              -H "X-Auth-Email: ${CF_API_EMAIL}" \
              -H "X-Auth-Key: ${CF_API_KEY}" \
              -H "Content-Type: application/json" \
              --data '{"title":"mirrorbot-rate-kv"}' | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['result']['id'])")
          else
            KV_ID="$EXISTING"
          fi

          echo "KV_ID=$KV_ID" >> $GITHUB_ENV
          sed -i "s/PLACEHOLDER_KV_ID/$KV_ID/" wrangler.toml

      - name: Deploy main Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 2069a0e7348e495373ef64e17cc6ecc1
          command: deploy

      - name: Set Telegram bot token secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "$TELEGRAM_BOT_TOKEN" | npx wrangler secret put TELEGRAM_BOT_TOKEN \
            --name mirrorbot
